name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      runner:
        description: Runner preference
        required: true
        default: auto
        type: choice
        options:
          - auto
          - home
          - github-hosted

jobs:
  route:
    runs-on: ubuntu-24.04
    outputs:
      runs_on: ${{ steps.pick.outputs.runs_on }}
      selected: ${{ steps.pick.outputs.selected }}
    steps:
      - id: pick
        env:
          GH_TOKEN: ${{ secrets.RUNNER_QUERY_TOKEN }}
          RUNNER_INPUT: ${{ inputs.runner }}
        shell: bash
        run: |
          set -euo pipefail

          github='["ubuntu-latest"]'
          home='["self-hosted","Linux","X64","home","tiny310"]'

          if [[ "$RUNNER_INPUT" == "github-hosted" ]]; then
            echo "runs_on=$github" >> "$GITHUB_OUTPUT"
            echo "selected=github-hosted-requested" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          runners="$(gh api "orgs/JeremyProffittOrg/actions/runners?per_page=100")"
          available="$(
            jq -r '
              .runners[]
              | select(.name == "tiny310")
              | select(.status == "online")
              | select(.busy == false)
              | [.labels[].name] as $labels
              | select(["self-hosted","Linux","X64","home","tiny310"] - $labels | length == 0)
              | .name
            ' <<< "$runners" | head -n 1
          )"

          if [[ "$RUNNER_INPUT" == "home" && -z "$available" ]]; then
            echo "tiny310 was requested but is not online and idle" >&2
            exit 1
          fi

          if [[ -n "$available" ]]; then
            echo "runs_on=$home" >> "$GITHUB_OUTPUT"
            echo "selected=home-auto" >> "$GITHUB_OUTPUT"
          else
            echo "runs_on=$github" >> "$GITHUB_OUTPUT"
            echo "selected=github-hosted-fallback" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: route
    runs-on: ${{ fromJSON(needs.route.outputs.runs_on) }}
    steps:
      - uses: actions/checkout@v4

      - name: Show runner
        shell: bash
        run: |
          echo "Selected: ${{ needs.route.outputs.selected }}"
          echo "Runner: $RUNNER_NAME"
          hostname

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        run: go build -v ./...

      - name: Unit Tests
        run: go test ./... -v -short

  build-binaries:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Linux AMD64
        run: GOOS=linux GOARCH=amd64 go build -o dist/go-mcp-ubiquiti-linux-amd64 .

      - name: Build Linux ARM64
        run: GOOS=linux GOARCH=arm64 go build -o dist/go-mcp-ubiquiti-linux-arm64 .

      - name: Build macOS AMD64
        run: GOOS=darwin GOARCH=amd64 go build -o dist/go-mcp-ubiquiti-darwin-amd64 .

      - name: Build macOS ARM64
        run: GOOS=darwin GOARCH=arm64 go build -o dist/go-mcp-ubiquiti-darwin-arm64 .

      - name: Build Windows AMD64
        run: GOOS=windows GOARCH=amd64 go build -o dist/go-mcp-ubiquiti-windows-amd64.exe .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/
          retention-days: 30

